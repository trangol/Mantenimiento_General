version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: plataforma_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: plataforma_mantenimientos
      POSTGRES_USER: plataforma_user
      POSTGRES_PASSWORD: plataforma_pass_2024
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U plataforma_user -d plataforma_mantenimientos']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: plataforma_cache
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: plataforma_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://plataforma_user:plataforma_pass_2024@postgres:5432/plataforma_mantenimientos
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-super_secret_refresh_key_change_in_production}
      PORT: 3001
      FRONTEND_URL: http://localhost:5173
    ports:
      - '3001:3001'
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: plataforma_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:3001/api
    ports:
      - '5173:80'

volumes:
  postgres_data:
  redis_data:
  uploads_data:
